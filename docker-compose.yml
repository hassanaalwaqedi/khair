version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: khair-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-khair}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-khair_secret}
      POSTGRES_DB: ${DB_NAME:-khair}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-khair}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: khair-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: khair-backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-khair}
      - DB_PASSWORD=${DB_PASSWORD:-khair_secret}
      - DB_NAME=${DB_NAME:-khair}
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - SERVER_PORT=8080
      - GIN_MODE=${GIN_MODE:-debug}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
