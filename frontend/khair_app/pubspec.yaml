name: khair_app
description: Khair - Event Discovery Platform

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.4.0
  
  # Dependency Injection
  get_it: ^9.2.0
  injectable: ^2.3.2
  
  # Navigation
  go_router: ^17.1.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  
  # Maps
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  intl: ^0.20.2
  
  # Utilities
  dartz: ^0.10.1
  json_annotation: ^4.8.1
  
  # Location
  geolocator: ^13.0.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0

  # Media
  image_picker: ^1.2.1
  video_player: ^2.9.2
  url_launcher: ^6.3.2
  file_picker: ^10.3.10
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "icon.png"
  web:
    generate: true
    image_path: "icon.png"
  windows:
    generate: true
    image_path: "icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - icon.png
    - video_khair.mp4
